name: astrbot_plugin_postsplitter
display_name: 后处理分段器
version: 1.3.2
description: 基于 LLM 的回复后处理分段器：对回复做自然分段，并支持自定义清洗、审查、特殊拒绝回退与打回重生成
author: Inoryu7z
repo: https://github.com/Inoryu7z/astrbot_plugin_postsplitter
changelog: |
  ## v1.3.2 更新说明
  1. ✅ 优化非调试模式日志输出：默认展示原文本、最终发送内容、分段统计/耗时信息，满足日常运行观测需求
  2. ✅ 修复分段一致性校验逻辑：未开启`enable_segments_consistency_check`配置项时，不再执行多余的内容比对、不会触发不必要的本地分段回退，完全信任模型返回的分段结果，同时不会输出对应的警告日志
  3. 保留占位符自动补回逻辑，确保富媒体组件位置不会丢失错位